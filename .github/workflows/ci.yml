name: CI/CD workflow

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main, "feature/**" ]

jobs:
  build-and-test:
    name: Compilación, Lint y Pruebas Unitarias
    runs-on: ubuntu-latest

    steps:
      - name: clonar repositorio
        uses: actions/checkout@v4

      - name: configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: instalar dependencias
        run: npm install

      - name: ejecutar ESLint (análisis estático)
        run: npm run lint

      - name: ejecutar pruebas unitarias
        run: npm test

      - name: generar reporte de cobertura
        run: npm run test:coverage

  despliegue-production:
    name: Despliegue en producción Vercel
    runs-on: ubuntu-latest
    needs: build-and-test

    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/')) && github.event_name == 'push'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: clonar repositorio
        uses: actions/checkout@v4

      - name: configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: instalar dependencias
        run: npm install

      - name: instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: obtener configuración de Vercel
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}

      - name: construir proyecto
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: desplegar en Vercel
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}